<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sidebar Aplikasi Madrasah</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Menambahkan Library Chart.js untuk membuat grafik -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            display: flex;
            height: 100vh;
            background-color: #f0f7ff; 
        }

        /* Sidebar Styling */
        .sidebar {
            width: 250px;
            background-color: #ffffff;
            border-right: 1px solid #e0e0e0;
            display: flex;
            flex-direction: column;
        }

        /* Bagian Logo */
        .logo-container {
            padding: 30px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-bottom: 1px solid #f0f0f0;
        }

        .logo-box {
            background-color: #004d40; 
            color: white;
            padding: 10px 15px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            gap: 10px;
            width: 100%;
        }

        .logo-box i {
            font-size: 20px;
            color: #4db6ac;
        }

        .logo-text {
            font-weight: bold;
            font-size: 14px;
            line-height: 1.2;
            text-transform: uppercase;
        }

        /* Navigasi Menu */
        .nav-menu {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
        }

        .nav-item {
            display: flex;
            align-items: center;
            padding: 15px 25px;
            text-decoration: none;
            color: #5f6368; 
            transition: background 0.3s;
            font-size: 15px;
            cursor: pointer;
        }

        .nav-item:hover, .nav-item.active {
            background-color: #f8f9fa;
            color: #1a73e8;
        }

        .nav-item i {
            margin-right: 15px;
            width: 20px;
            text-align: center;
            font-size: 18px;
        }

        /* Area Konten (Kanan) */
        .main-content {
            flex-grow: 1;
            background-color: #f4f8fb;
            padding: 30px;
            overflow-y: auto;
        }

        /* Styling untuk wadah tampilan grafik */
        #display-data {
            background-color: #ffffff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            border: 1px solid #e0e0e0;
            margin-top: 15px;
            width: 100%;
            max-width: 800px; /* Membatasi lebar grafik agar proporsional */
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo-container">
            <div class="logo-box">
                <i class="fas fa-book-open"></i>
                <div class="logo-text">APLIKASI<br>MADRASAH</div>
            </div>
        </div>

        <div class="nav-menu">
            <!-- 1. Tombol Dashboard (Di atas Data Siswa) -->
            <a href="#" class="nav-item active" onclick="loadDashboard(this)">
                <i class="fas fa-chart-pie"></i>
                Dashboard Data Ujian
            </a>

            <!-- Tombol Data Siswa -->
            <a href="https://appsmadrasah.github.io/datasiswa.html" class="nav-item">
                <i class="fas fa-users"></i>
                Data Siswa
            </a>
            
            <!-- 3. Tombol Daftar Hadir (Di bawah Data Siswa) -->
            <a href="#" class="nav-item">
                <i class="fas fa-clipboard-list"></i>
                Daftar Hadir
            </a>
            
            <a href="https://appsmadrasah.github.io/kartu1.html" class="nav-item">
                <i class="fas fa-address-card"></i>
                Nomor Ujian Nasional
            </a>
            
            <a href="https://appsmadrasah.github.io/kartu2.html" class="nav-item">
                <i class="fas fa-user-check"></i>
                Nomor Ujian SAT
            </a>
        </div>
    </div>

    <div class="main-content">
        <h2>Dashboard Data Ujian</h2>
        <div id="display-data">
            <!-- Area ini akan diisi oleh grafik (Canvas) -->
            <p style="color: #1a73e8;">Memuat data dari Firebase...</p>
        </div>
    </div>

    <script>
        // Menyimpan instance chart agar bisa di-reset saat tombol diklik ulang
        let myChart = null;

        // Fungsi ini akan berjalan otomatis saat halaman dimuat, 
        // dan saat tombol "Dashboard Data Ujian" diklik
        function loadDashboard(element) {
            // Ubah warna tombol aktif
            if(element) {
                const allNavItems = document.querySelectorAll('.nav-item');
                allNavItems.forEach(nav => nav.classList.remove('active'));
                element.classList.add('active');
            }

            const displayArea = document.getElementById('display-data');
            
            // 2. Mengambil data dari Firebase
            // Catatan: Anda WAJIB menambahkan '.json' di akhir URL Firebase untuk mengambil datanya via Fetch API
            // Jika data tersimpan di folder tertentu, misalnya /siswa, maka URL menjadi ...app/siswa.json
            const firebaseUrl = 'https://datasiswa-65abf-default-rtdb.asia-southeast1.firebasedatabase.app/.json';

            fetch(firebaseUrl)
                .then(response => {
                    if (!response.ok) throw new Error("Gagal terhubung ke Firebase");
                    return response.json();
                })
                .then(data => {
                    if (!data) {
                        displayArea.innerHTML = '<p style="color: red;">Database Firebase Anda masih kosong.</p>';
                        return;
                    }

                    // Membuat elemen Canvas untuk Chart.js
                    displayArea.innerHTML = '<canvas id="grafikSiswa"></canvas>';
                    const ctx = document.getElementById('grafikSiswa').getContext('2d');

                    // ==========================================
                    // LOGIKA PENGOLAHAN DATA GRAFIK
                    // ==========================================
                    // Karena struktur data Anda di Firebase belum diketahui spesifiknya, 
                    // ini adalah contoh dasar. Script ini mencoba membaca data yang berbentuk Object/Array.
                    
                    let totalSiswa = 0;
                    
                    // Asumsi 1: Jika data berbentuk array atau object, kita hitung jumlahnya
                    if (typeof data === 'object') {
                        totalSiswa = Object.keys(data).length;
                    }

                    // Menyiapkan label dan angka untuk grafik (Contoh: Total Data Masuk)
                    const labels = ["Total Siswa Terdaftar"];
                    const dataAngka = [totalSiswa];

                    // ==========================================

                    // Hapus chart lama jika ada agar tidak menumpuk
                    if(myChart) {
                        myChart.destroy();
                    }

                    // Render Grafik menggunakan Chart.js
                    myChart = new Chart(ctx, {
                        type: 'bar', // Bisa diganti 'pie', 'line', 'doughnut'
                        data: {
                            labels: labels,
                            datasets: [{
                                label: 'Statistik Data Firebase',
                                data: dataAngka,
                                backgroundColor: ['rgba(54, 162, 235, 0.7)'],
                                borderColor: ['rgba(54, 162, 235, 1)'],
                                borderWidth: 1
                            }]
                        },
                        options: {
                            responsive: true,
                            scales: {
                                y: {
                                    beginAtZero: true,
                                    ticks: {
                                        stepSize: 1 // Skala angka genap bulat
                                    }
                                }
                            }
                        }
                    });
                })
                .catch(error => {
                    displayArea.innerHTML = `
                        <p style="color: red; font-weight: bold;">Gagal Memuat Grafik!</p>
                        <p style="font-size: 14px; color: #555;">
                            <b>Alasan:</b> Akses ditolak atau link salah.<br>
                            <b>Solusi:</b> Buka Firebase Console > Realtime Database > Rules. Ubah menjadi:<br>
                            <code>".read": true</code>
                        </p>
                    `;
                    console.error("Error Firebase:", error);
                });
        }

        // Panggil fungsi secara otomatis ketika halaman pertama kali dibuka
        window.onload = () => {
            const btnDashboard = document.querySelector('.nav-item.active');
            loadDashboard(btnDashboard);
        };
    </script>

</body>
</html>
