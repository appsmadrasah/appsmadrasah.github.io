<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sidebar Aplikasi Madrasah</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            display: flex;
            height: 100vh;
            background-color: #f0f7ff; /* Warna background utama sesuai gambar */
        }

        /* Sidebar Styling */
        .sidebar {
            width: 250px;
            background-color: #ffffff;
            border-right: 1px solid #e0e0e0;
            display: flex;
            flex-direction: column;
        }

        /* Bagian Logo */
        .logo-container {
            padding: 30px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-bottom: 1px solid #f0f0f0;
        }

        .logo-box {
            background-color: #004d40; /* Warna hijau gelap sesuai logo */
            color: white;
            padding: 10px 15px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            gap: 10px;
            width: 100%;
        }

        .logo-box i {
            font-size: 20px;
            color: #4db6ac;
        }

        .logo-text {
            font-weight: bold;
            font-size: 14px;
            line-height: 1.2;
            text-transform: uppercase;
        }

        /* Navigasi Menu */
        .nav-menu {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
        }

        .nav-item {
            display: flex;
            align-items: center;
            padding: 15px 25px;
            text-decoration: none;
            color: #5f6368; /* Warna teks abu-abu sesuai gambar */
            transition: background 0.3s;
            font-size: 15px;
        }

        .nav-item:hover {
            background-color: #f8f9fa;
            color: #1a73e8;
        }

        .nav-item i {
            margin-right: 15px;
            width: 20px;
            text-align: center;
            font-size: 18px;
        }

        /* Area Konten Kosong (Kanan) */
        .main-content {
            flex-grow: 1;
            background-color: #f4f8fb;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo-container">
            <div class="logo-box">
                <i class="fas fa-book-open"></i>
                <div class="logo-text">APLIKASI<br>MADRASAH</div>
            </div>
        </div>

        <div class="nav-menu">
            <a href="#" class="nav-item">
                <i class="fas fa-address-card"></i>
                Nomor Ujian Nasional
            </a>
            
            <a href="#" class="nav-item">
                <i class="fas fa-user-check"></i>
                Nomor Ujian SAT
            </a>
        </div>
    </div>

    <div class="main-content"></div>

</body>
</html>
