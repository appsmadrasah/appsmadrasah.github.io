<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikasi Madrasah Terpadu</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            display: flex;
            height: 100vh;
            background-color: #f0f7ff; 
            overflow: hidden; /* Mencegah scroll ganda */
        }

        /* Sidebar Styling */
        .sidebar {
            width: 250px;
            background-color: #ffffff;
            border-right: 1px solid #e0e0e0;
            display: flex;
            flex-direction: column;
            z-index: 10;
        }

        .logo-container {
            padding: 30px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-bottom: 1px solid #f0f0f0;
        }

        .logo-box {
            background-color: #004d40; 
            color: white;
            padding: 10px 15px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            gap: 10px;
            width: 100%;
        }

        .logo-box i { font-size: 20px; color: #4db6ac; }
        .logo-text { font-weight: bold; font-size: 14px; line-height: 1.2; text-transform: uppercase; }

        .nav-menu { margin-top: 20px; display: flex; flex-direction: column; }

        .nav-item {
            display: flex;
            align-items: center;
            padding: 15px 25px;
            text-decoration: none;
            color: #5f6368; 
            transition: background 0.3s;
            font-size: 15px;
            cursor: pointer;
        }

        .nav-item:hover, .nav-item.active {
            background-color: #f8f9fa;
            color: #1a73e8;
        }

        .nav-item i { margin-right: 15px; width: 20px; text-align: center; font-size: 18px; }

        /* Area Konten Kanan */
        .main-content {
            flex-grow: 1;
            background-color: #f4f8fb;
            position: relative;
            height: 100%;
        }

        /* Halaman tunggal (Page) */
        .page {
            display: none; /* Disembunyikan secara default */
            width: 100%;
            height: 100%;
        }

        /* Halaman yang sedang aktif */
        .page.active-page {
            display: block; 
        }

        /* Khusus Dashboard (karena bukan iframe) */
        #dashboard {
            padding: 30px;
            overflow-y: auto;
        }

        .chart-container {
            background-color: #ffffff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            border: 1px solid #e0e0e0;
            margin-top: 15px;
            max-width: 800px;
        }

        /* Styling untuk Iframe agar penuh */
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo-container">
            <div class="logo-box">
                <i class="fas fa-book-open"></i>
                <div class="logo-text">APLIKASI<br>MADRASAH</div>
            </div>
        </div>

        <div class="nav-menu">
            <!-- Tombol Navigasi memanggil fungsi showPage() -->
            <div class="nav-item active" onclick="showPage('dashboard', this)">
                <i class="fas fa-chart-pie"></i>
                Dashboard Data Ujian
            </div>

            <div class="nav-item" onclick="showPage('siswa', this)">
                <i class="fas fa-users"></i>
                Data Siswa
            </div>
            
            <div class="nav-item" onclick="showPage('hadir', this)">
                <i class="fas fa-clipboard-list"></i>
                Daftar Hadir
            </div>
            
            <div class="nav-item" onclick="showPage('un', this)">
                <i class="fas fa-address-card"></i>
                Nomor Ujian Nasional
            </div>
            
            <div class="nav-item" onclick="showPage('sat', this)">
                <i class="fas fa-user-check"></i>
                Nomor Ujian SAT
            </div>
        </div>
    </div>

    <!-- AREA KANAN -->
    <div class="main-content">
        
        <!-- 1. Halaman Dashboard (Tampil Default) -->
        <div id="dashboard" class="page active-page">
            <h2>Dashboard Data Ujian</h2>
            <div class="chart-container">
                <canvas id="grafikSiswa"></canvas>
            </div>
        </div>

        <!-- 2. Halaman Data Siswa (Memuat Link Eksternal) -->
        <div id="siswa" class="page">
            <iframe src="https://appsmadrasah.github.io/datasiswa.html"></iframe>
        </div>

        <!-- 3. Halaman Daftar Hadir (Masih Kosong/Placeholder) -->
        <div id="hadir" class="page">
            <div style="padding: 30px;">
                <h2>Daftar Hadir</h2>
                <p>Halaman daftar hadir belum ditautkan ke link manapun.</p>
            </div>
        </div>

        <!-- 4. Halaman Ujian Nasional (Memuat Link Eksternal) -->
        <div id="un" class="page">
            <iframe src="https://appsmadrasah.github.io/kartu1.html"></iframe>
        </div>

        <!-- 5. Halaman Ujian SAT (Memuat Link Eksternal) -->
        <div id="sat" class="page">
            <iframe src="https://appsmadrasah.github.io/kartu2.html"></iframe>
        </div>

    </div>

    <script>
        // FUNGSI NAVIGASI: Pindah menu tanpa reload
        function showPage(pageId, element) {
            // Sembunyikan semua konten
            document.querySelectorAll('.page').forEach(page => {
                page.classList.remove('active-page');
            });

            // Hilangkan status aktif dari semua tombol menu
            document.querySelectorAll('.nav-item').forEach(nav => {
                nav.classList.remove('active');
            });

            // Tampilkan konten yang diklik dan beri warna biru pada tombolnya
            document.getElementById(pageId).classList.add('active-page');
            element.classList.add('active');
        }

        // FUNGSI DASHBOARD: Memuat grafik Firebase
        window.onload = () => {
            const firebaseUrl = 'https://datasiswa-65abf-default-rtdb.asia-southeast1.firebasedatabase.app/.json';

            fetch(firebaseUrl)
                .then(response => response.json())
                .then(data => {
                    let totalSiswa = 0;
                    if (typeof data === 'object' && data !== null) {
                        totalSiswa = Object.keys(data).length;
                    }

                    const ctx = document.getElementById('grafikSiswa').getContext('2d');
                    new Chart(ctx, {
                        type: 'bar',
                        data: {
                            labels: ["Total Siswa Terdaftar"],
                            datasets: [{
                                label: 'Jumlah Siswa dari Firebase',
                                data: [totalSiswa],
                                backgroundColor: 'rgba(54, 162, 235, 0.7)',
                                borderColor: 'rgba(54, 162, 235, 1)',
                                borderWidth: 1
                            }]
                        },
                        options: {
                            responsive: true,
                            scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } }
                        }
                    });
                })
                .catch(error => {
                    console.error("Gagal memuat Firebase:", error);
                });
        };
    </script>

</body>
</html>
