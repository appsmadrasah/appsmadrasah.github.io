<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Siswa</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
        /* === CSS APLIKASI UTAMA === */
        body { font-family: Arial, sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; }
        .app-container { max-width: 1000px; margin: 0 auto; background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #333; margin-top: 5px; }

        /* Tabel Data & Form */
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 14px;}
        table, th, td { border: 1px solid #ddd; }
        th, td { padding: 8px; text-align: left; }
        th { background-color: #4CAF50; color: white; }
        
        /* Tombol Aksi Tabel */
        .btn-edit { padding: 5px; background: #FFC107; color: black; border: none; border-radius: 3px; cursor: pointer; font-size: 12px;}
        .btn-hapus { padding: 5px; background: #f44336; color: white; border: none; border-radius: 3px; cursor: pointer; font-size: 12px;}
        
        /* Tombol Toolbar Atas */
        .toolbar { display: flex; gap: 10px; margin-bottom: 15px; align-items: center; flex-wrap: wrap;}
        .btn-toolbar { padding: 10px 15px; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn-tambah { background: #4CAF50; }
        .btn-sortir { background: #9C27B0; cursor: pointer; font-family: inherit; font-size: 14px; outline: none;}    
        .btn-template { background: #2196F3; } 
        .btn-excel { background: #1b7339; }    
        .btn-hapus-massal { background: #f44336; } 
        
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-weight: bold; margin-bottom: 5px; }
        .form-group input[type="text"] { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
        
        /* === CSS MODAL (POP-UP FORM) === */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.5); }
        .modal-content { background-color: #fff; margin: 5% auto; padding: 20px; border-radius: 8px; width: 400px; box-shadow: 0 4px 8px rgba(0,0,0,0.2); }
        .modal-header { font-size: 18px; font-weight: bold; margin-bottom: 15px; display: flex; justify-content: space-between;}
        .close-btn { cursor: pointer; color: red; font-weight: bold; font-size: 20px;}
        .modal-footer { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
        .btn-batal { background: #ccc; border: none; padding: 10px 15px; border-radius: 4px; cursor: pointer; }
        .btn-simpan { padding: 10px 15px; background: #4CAF50; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="app-container" id="app-container">
    <h2>Data Siswa</h2>
    
    <div class="toolbar">
        <button class="btn-toolbar btn-tambah" onclick="bukaModalForm()">➕ Tambah Siswa</button>
        
        <!-- Fitur Dropdown Sortir Kelas -->
        <select class="btn-toolbar btn-sortir" id="filter-kelas" onchange="renderTabel()">
            <option value="semua" style="color: black;">🔃 Filter Kelas (Semua)</option>
            <option value="1" style="color: black;">Kelas 1</option>
            <option value="2" style="color: black;">Kelas 2</option>
            <option value="3" style="color: black;">Kelas 3</option>
            <option value="4" style="color: black;">Kelas 4</option>
            <option value="5" style="color: black;">Kelas 5</option>
            <option value="6" style="color: black;">Kelas 6</option>
        </select>

        <button class="btn-toolbar btn-excel" onclick="document.getElementById('inputExcel').click()">📊 Impor dari Excel</button>
        <input type="file" id="inputExcel" accept=".xlsx, .xls" style="display: none;" onchange="prosesImporExcel(event)">
        
        <button class="btn-toolbar btn-template" onclick="downloadTemplateExcel()">⬇️ Download Template</button>
        <button class="btn-toolbar btn-hapus-massal" onclick="hapusTerpilih()">🗑️ Hapus Terpilih</button>
    </div>

    <table>
        <thead>
            <tr>
                <th style="width: 30px; text-align: center;">
                    <input type="checkbox" id="check-all" onclick="toggleSelectAll(this)" title="Pilih Semua">
                </th>
                <th style="width: 40px; text-align: center;">No.</th>
                <th>Nama</th>
                <th>Tgl Lahir</th>
                <th>No. Ujian</th>
                <th>NISN</th>
                <th>Kelas</th>
                <th style="width: 80px; text-align:center;">Aksi</th>
            </tr>
        </thead>
        <tbody id="tabel-body">
            <!-- Data akan dimuat secara otomatis dari Firebase -->
        </tbody>
    </table>
</div>

<!-- Modal Tambah / Edit Siswa -->
<div id="modalForm" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <span id="modal-judul">Tambah Siswa</span>
            <span class="close-btn" onclick="tutupModalForm()">&times;</span>
        </div>
        <input type="hidden" id="form-index" value=""> 
        <div class="form-group"><label>Nama Peserta:</label><input type="text" id="form-nama" autocomplete="off"></div>
        <div class="form-group"><label>Tanggal Lahir:</label><input type="text" id="form-tgl" placeholder="Contoh: 2006-03-08" autocomplete="off"></div>
        <div class="form-group">
            <label>Nomor Ujian:</label>
            <input type="text" id="form-no" autocomplete="off" placeholder="Kosongkan agar terisi otomatis (6 Digit)">
        </div>
        <div class="form-group"><label>NISN:</label><input type="text" id="form-nisn" autocomplete="off"></div>
        <div class="form-group">
            <label>Kelas:</label>
            <input type="text" id="form-kelas" autocomplete="off" placeholder="Contoh: Ketik angka 1, otomatis jadi 1 (Satu)">
        </div>
        <div class="modal-footer">
            <button class="btn-batal" onclick="tutupModalForm()">Batal</button>
            <button class="btn-simpan" onclick="simpanSiswa()">Simpan Data</button>
        </div>
    </div>
</div>

<script type="module">
    // Import SDK Firebase
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
    import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-analytics.js";
    import { getDatabase, ref, set, push, onValue, remove } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

    // Firebase configuration
    const firebaseConfig = {
        apiKey: "AIzaSyCae3CoI4eWy9T6yhf_yGvoHiyoAJ7gUyA",
        authDomain: "datasiswa-65abf.firebaseapp.com",
        databaseURL: "https://datasiswa-65abf-default-rtdb.asia-southeast1.firebasedatabase.app/",
        projectId: "datasiswa-65abf",
        storageBucket: "datasiswa-65abf.firebasestorage.app",
        messagingSenderId: "1043621527533",
        appId: "1:1043621527533:web:3e854e6c862709002731e4",
        measurementId: "G-D6YZGM4KT5"
    };

    // Inisialisasi Firebase & Database
    const app = initializeApp(firebaseConfig);
    const analytics = getAnalytics(app);
    const db = getDatabase(app);

    window.dataPeserta = [];
    window.dataKeys = [];

    // Listener Real-time Firebase
    const siswaRef = ref(db, 'siswa');
    onValue(siswaRef, (snapshot) => {
        const data = snapshot.val();
        window.dataPeserta = [];
        window.dataKeys = [];
        
        if (data) {
            Object.keys(data).forEach(key => {
                window.dataPeserta.push(data[key]);
                window.dataKeys.push(key);
            });
        }
        window.renderTabel();
    });

    // --- FUNGSI FORMAT KELAS: 1 -> 1 (Satu) ---
    window.formatKelasBaku = function(input) {
        let str = String(input || "").trim();
        
        // Hapus kata "kelas" jika pengguna/excel terlanjur menginputkannya
        str = str.replace(/kelas/i, "").trim();
        
        const mapKata = {
            "1": "Satu", "2": "Dua", "3": "Tiga",
            "4": "Empat", "5": "Lima", "6": "Enam"
        };

        const match = str.match(/\d+/);
        if (match) {
            let num = match[0];
            if (mapKata[num]) {
                // Jika belum ada ejaan kurungnya, kita buatkan
                if (!str.toLowerCase().includes(mapKata[num].toLowerCase())) {
                    // Contoh: "1" -> "1 (Satu)", "6A" -> "6 (Enam) A"
                    str = str.replace(num, `${num} (${mapKata[num]}) `).trim();
                }
            }
        }
        return str;
    }

    // Fungsi Render Tabel
    window.renderTabel = function() {
        const tbody = document.getElementById("tabel-body");
        tbody.innerHTML = "";
        
        const checkAll = document.getElementById("check-all");
        if(checkAll) checkAll.checked = false;
        
        const filterValue = document.getElementById("filter-kelas").value;
        let nomorUrut = 1;

        window.dataPeserta.forEach((p, index) => {
            let tampilkan = true;
            
            // Rapikan format kelas sebelum ditampilkan
            let displayKelas = window.formatKelasBaku(p.kelas);
            
            // Logika Penyaringan (Filter) - Ekstrak angka saja
            if (filterValue !== "semua") {
                const matchNumber = displayKelas.match(/\d+/);
                const classNumber = matchNumber ? matchNumber[0] : "";
                
                if (classNumber !== filterValue) {
                    tampilkan = false;
                }
            }

            if (tampilkan) {
                const tr = `<tr>
                    <td style="text-align: center;">
                        <input type="checkbox" class="check-item" value="${index}">
                    </td>
                    <td style="text-align: center;">${nomorUrut}</td>
                    <td>${p.nama}</td>
                    <td>${p.tglLahir}</td>
                    <td>${p.noUjian}</td>
                    <td>${displayKelas}</td>
                    <td style="text-align:center;">
                        <button class="btn-edit" onclick="bukaModalForm(${index})" title="Edit Data">✏️</button>
                        <button class="btn-hapus" onclick="hapusSiswa(${index})" title="Hapus Data">🗑️</button>
                    </td>
                </tr>`;
                tbody.innerHTML += tr;
                nomorUrut++;
            }
        });
    }

    // Fungsi Hapus Massal (Checkbox)
    window.toggleSelectAll = function(source) {
        const checkboxes = document.querySelectorAll('.check-item');
        checkboxes.forEach(cb => cb.checked = source.checked);
    }

    window.hapusTerpilih = function() {
        const checkboxes = document.querySelectorAll('.check-item:checked');
        if (checkboxes.length === 0) {
            alert("Silakan pilih/centang data yang ingin dihapus terlebih dahulu!");
            return;
        }

        if(confirm(`Peringatan: Anda yakin ingin menghapus ${checkboxes.length} data siswa yang terpilih secara permanen?`)) {
            checkboxes.forEach(cb => {
                const index = cb.value;
                const key = window.dataKeys[index];
                if (key) remove(ref(db, `siswa/${key}`)); 
            });
            document.getElementById('check-all').checked = false;
        }
    }

    // Modal
    window.bukaModalForm = function(index = null) {
        document.getElementById('modalForm').style.display = 'block';
        if(index !== null) {
            document.getElementById('modal-judul').innerText = "Edit Siswa";
            document.getElementById('form-index').value = index;
            document.getElementById('form-nama').value = window.dataPeserta[index].nama;
            document.getElementById('form-tgl').value = window.dataPeserta[index].tglLahir;
            document.getElementById('form-no').value = window.dataPeserta[index].noUjian;
            document.getElementById('form-nisn').value = window.dataPeserta[index].nisn;
            
            // Format tampilan modal agar muncul "1 (Satu)"
            document.getElementById('form-kelas').value = window.formatKelasBaku(window.dataPeserta[index].kelas);
        } else {
            document.getElementById('modal-judul').innerText = "Tambah Siswa Baru";
            document.getElementById('form-index').value = "";
            document.getElementById('form-nama').value = "";
            document.getElementById('form-tgl').value = "";
            document.getElementById('form-no').value = "";
            document.getElementById('form-nisn').value = "";
            document.getElementById('form-kelas').value = "";
        }
    }

    window.tutupModalForm = function() { document.getElementById('modalForm').style.display = 'none'; }

    // --- FUNGSI GENERATE NOMOR UJIAN OTOMATIS ---
    window.generateNoUjian = function(currentMaxOverride = null) {
        let maxNo = currentMaxOverride || 0;
        
        if (currentMaxOverride === null) {
            window.dataPeserta.forEach(p => {
                let num = parseInt(p.noUjian, 10);
                if (!isNaN(num) && num > maxNo) {
                    maxNo = num;
                }
            });
        }
        
        return String(maxNo + 1).padStart(6, '0');
    }

    // Simpan Data Manual
    window.simpanSiswa = function() {
        const index = document.getElementById('form-index').value;
        let inputNoUjian = document.getElementById('form-no').value.trim();
        let inputKelas = document.getElementById('form-kelas').value.trim();
        
        // Otomatis 6 digit
        if (inputNoUjian === "") {
            inputNoUjian = window.generateNoUjian();
        }

        // Otomatis ubah "1" jadi "1 (Satu)"
        inputKelas = window.formatKelasBaku(inputKelas);

        const dataBaru = {
            nama: document.getElementById('form-nama').value.toUpperCase(),
            tglLahir: document.getElementById('form-tgl').value,
            noUjian: inputNoUjian,
            nisn: document.getElementById('form-nisn').value,
            kelas: inputKelas
        };

        if(dataBaru.nama === "" || dataBaru.nisn === "") { 
            alert("Nama dan NISN tidak boleh kosong!"); 
            return; 
        }

        if(index === "") {
            const newSiswaRef = push(ref(db, 'siswa'));
            set(newSiswaRef, dataBaru);
        } else {
            const key = window.dataKeys[index];
            set(ref(db, `siswa/${key}`), dataBaru);
        }
        
        window.tutupModalForm(); 
    }

    window.hapusSiswa = function(index) {
        const namaSiswa = window.dataPeserta[index].nama;
        if(confirm(`Yakin ingin menghapus data ${namaSiswa}?`)) {
            const key = window.dataKeys[index];
            remove(ref(db, `siswa/${key}`));
        }
    }

    window.downloadTemplateExcel = function() {
        const dataTemplate = [
            ["Nama", "Tgl Lahir", "No. Ujian", "NISN", "Kelas"],
            ["CONTOH NAMA SISWA", "2006-03-08", "", "1234567890", "6"]
        ];
        const workbook = window.XLSX.utils.book_new();
        const worksheet = window.XLSX.utils.aoa_to_sheet(dataTemplate);
        worksheet['!cols'] = [ { wch: 30 }, { wch: 15 }, { wch: 25 }, { wch: 15 }, { wch: 15 } ];
        
        window.XLSX.utils.book_append_sheet(workbook, worksheet, "Data_Siswa");
        window.XLSX.writeFile(workbook, "Template_Data_Siswa.xlsx");
    }

    // Impor Excel
    window.prosesImporExcel = function(event) {
        const file = event.target.files[0];
        if(!file) return;

        const reader = new FileReader();
        reader.onload = function(e) {
            const data = new Uint8Array(e.target.result);
            const workbook = window.XLSX.read(data, {type: 'array'});
            const firstSheetName = workbook.SheetNames[0];
            const jsonSheet = window.XLSX.utils.sheet_to_json(workbook.Sheets[firstSheetName], {raw: false});
            
            let berhasil = 0;
            
            let currentMaxNo = 0;
            window.dataPeserta.forEach(p => {
                let num = parseInt(p.noUjian, 10);
                if (!isNaN(num) && num > currentMaxNo) {
                    currentMaxNo = num;
                }
            });

            jsonSheet.forEach(row => {
                const keys = Object.keys(row);
                const getVal = (keywords) => {
                    const matchKey = keys.find(k => keywords.some(word => k.toLowerCase().includes(word)));
                    return matchKey ? row[matchKey] : "";
                };

                const nama = getVal(["nama"]);
                const tgl = getVal(["lahir", "tanggal", "tgl", "ttl"]); 
                let no = getVal(["ujian", "nomor", "peserta", "no. ", "no "]);
                const nisn = getVal(["nisn"]);
                let kelas = getVal(["kelas", "kls"]);
                
                // Urus Nomor Ujian Otomatis
                if(!no || String(no).trim() === "") {
                    no = window.generateNoUjian(currentMaxNo);
                    currentMaxNo++; 
                } else {
                    no = String(no).trim();
                }

                // Otomatis ubah format kelas misal 1 jadi 1 (Satu) saat diimpor
                let stringKelas = window.formatKelasBaku(kelas);

                if(nama && nisn) { 
                    const newSiswaRef = push(ref(db, 'siswa'));
                    set(newSiswaRef, {
                        nama: String(nama).toUpperCase(), 
                        tglLahir: tgl || "", 
                        noUjian: no, 
                        nisn: nisn, 
                        kelas: stringKelas
                    });
                    berhasil++;
                }
            });

            alert(`Selesai! Berhasil mengirimkan ${berhasil} data siswa baru ke cloud Firebase.\nNomor ujian otomatis dibuatkan.\nFormat kelas otomatis disesuaikan (Contoh: 1 menjadi 1 (Satu)).`);
            document.getElementById('inputExcel').value = ""; 
        };
        reader.readAsArrayBuffer(file);
    }
</script>

</body>
</html>
